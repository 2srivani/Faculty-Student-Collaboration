<!DOCTYPE html>
<html>
<head>

<title>Manage Users</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
padding:40px;
}

form{
background:white;
padding:20px;
margin-bottom:30px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,select{
padding:8px;
margin:10px;
}

button{
padding:8px 15px;
background:#2ecc71;
color:white;
border:none;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{
background:#34495e;
color:white;
}

</style>

</head>

<body>

<h1>👥 Manage Users</h1>

<form method="POST">

<input type="text" name="name" placeholder="Enter Name" required>

<select name="role">

<option value="Student">Student</option>
<option value="Faculty">Faculty</option>

</select>

<button type="submit">Add User</button>

</form>


<h2>Registered Users</h2>

<table>

<tr>
<th>Name</th>
<th>Role</th>
</tr>

{% for user in users %}

<tr>
<td>{{ user.name }}</td>
<td>{{ user.role }}</td>
</tr>

{% endfor %}

</table>

</body>

</html>
